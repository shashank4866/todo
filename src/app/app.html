<div class="todo-container">
  <h2>TODO LIST</h2>
  <div class="todos-container">
    <div class="input-wraper">
      <input type="text" [(ngModel)]="taskname" placeholder="Enter task name" (keyup.enter)="addTask()" [disabled]="isAdding">
      <button (click)="addTask()" [disabled]="isAdding || !taskname.trim()">add</button>
    </div>
    <div class="spinner-container" *ngIf="isLoading">
      <div class="spinner"></div>
    </div>
    <div class="todos-subcontainer">
      <div class="task-card" *ngFor="let task of tasks; let i = index" [ngClass]="{'completed': task.tstatus === 'completed'}" [style.animation-delay.ms]="i * 100">
        <p>{{task.tname}}</p>
        <button [ngClass]="task.tstatus=='pending'?'inactive':'active'" (click)="toggleTask(task)" [disabled]="isToggling[task.id]">{{isToggling[task.id]?'...':task.tstatus}}</button>
        <button (click)="deleteTask(task.id)" [disabled]="isDeleting[task.id]">delete</button>
      </div>
      <div class="no-tasks-message" *ngIf="!isLoading && tasks && tasks.length === 0">
        <p>📋 No tasks found</p>
        <span>Add a task to get started</span>
      </div>
    </div>
  </div>
</div>
